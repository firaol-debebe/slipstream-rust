name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config build-essential libssl-dev python3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add target
        run: rustup target add x86_64-unknown-linux-gnu || true

      - name: Build release (x86_64)
        run: cargo build -p slipstream-client -p slipstream-server --release --target x86_64-unknown-linux-gnu

      - name: Package Linux artifacts
        run: |
          mkdir -p out/linux
          cp target/x86_64-unknown-linux-gnu/release/slipstream-client out/linux/ || true
          cp target/x86_64-unknown-linux-gnu/release/slipstream-server out/linux/ || true
          tar -czf slipstream-linux-artifacts.tar.gz -C out linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: slipstream-linux-artifacts.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Clone and bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install OpenSSL via vcpkg (x64)
        shell: powershell
        run: |
          .\vcpkg\vcpkg.exe install openssl:x64-windows
          $installed = Join-Path $PWD 'vcpkg\installed\x64-windows'
          "OPENSSL_ROOT_DIR=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_DIR=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_INCLUDE_DIR=$installed\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_LIB_DIR=$installed\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Also set platform-specific var some build scripts read:
          "X86_64_PC_WINDOWS_MSVC_OPENSSL_DIR=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add target
        run: rustup target add x86_64-pc-windows-msvc || true

      - name: Build x86_64-pc-windows-msvc
        shell: powershell
        env:
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          X86_64_PC_WINDOWS_MSVC_OPENSSL_DIR: ${{ env.X86_64_PC_WINDOWS_MSVC_OPENSSL_DIR }}
        run: |
          cargo build -p slipstream-client -p slipstream-server --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifacts
        shell: powershell
        run: |
          mkdir out\windows
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-client.exe -Destination out\windows -ErrorAction SilentlyContinue
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-server.exe -Destination out\windows -ErrorAction SilentlyContinue
          Compress-Archive -Path out\windows -DestinationPath slipstream-windows-artifacts.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: slipstream-windows-artifacts.zip

  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential cmake python3 unzip clang

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Android NDK (r25b)
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip ndk.zip -d $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV

      - name: Add Rust target for Android arm64
        run: rustup target add aarch64-linux-android || true

      - name: Build Android arm64 (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          # Ensure no conflicting NDK env var from runner
          unset ANDROID_NDK_ROOT || true
          export PATH="$HOME/.cargo/bin:$PATH"
          export ANDROID_NDK_HOME="$ANDROID_NDK_HOME"
          cargo ndk -t arm64-v8a -o out/android build --release -p slipstream-client -p slipstream-server

      - name: Package Android artifacts
        run: |
          tar -czf slipstream-android-artifacts.tar.gz -C out android || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: slipstream-android-artifacts.tar.gz

  assemble-and-release:
    name: Assemble artifacts and create release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: artifacts/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-artifact
          path: artifacts/android

      - name: Create super-archive
        run: |
          mkdir -p out/super
          cp artifacts/linux/* out/super/ || true
          cp artifacts/windows/* out/super/ || true
          cp artifacts/android/* out/super/ || true
          tar -czf slipstream-all-platforms-${{ github.run_id }}.tar.gz -C out super

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          release_name: "Slipstream Release ${{ github.run_id }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload super-archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_name: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
