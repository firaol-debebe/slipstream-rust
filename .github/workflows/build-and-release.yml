name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (x86_64 + aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config build-essential libssl-dev python3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add targets
        run: |
          rustup target add x86_64-unknown-linux-gnu || true
          rustup target add aarch64-unknown-linux-gnu || true

      - name: Build release (x86_64)
        run: |
          cargo build -p slipstream-client -p slipstream-server --release --target x86_64-unknown-linux-gnu

      # - name: Build release (aarch64)
      #   run: |
      #     cargo build -p slipstream-client -p slipstream-server --release --target aarch64-unknown-linux-gnu

      - name: Package Linux artifacts
        run: |
          mkdir -p out/linux
          cp target/x86_64-unknown-linux-gnu/release/slipstream-client out/linux/ || true
          cp target/x86_64-unknown-linux-gnu/release/slipstream-server out/linux/ || true
          # cp target/aarch64-unknown-linux-gnu/release/slipstream-client out/linux/slipstream-client-aarch64 || true
          # cp target/aarch64-unknown-linux-gnu/release/slipstream-server out/linux/slipstream-server-aarch64 || true
          tar -czf slipstream-linux-artifacts.tar.gz -C out linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: slipstream-linux-artifacts.tar.gz

  build-windows:
    name: Build Windows (x86_64 + aarch64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add targets
        run: |
          rustup target add x86_64-pc-windows-msvc || true
          # rustup target add aarch64-pc-windows-msvc || true
          
      - name: Bootstrap vcpkg and install openssh
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install openssl:arm64-windows

      - name: Build x86_64-pc-windows-msvc
        shell: powershell
        run: |
          $env:OPENSSL_DIR = "$(pwd)\vcpkg\installed\x64-windows"
          cargo build --release --target x86_64-pc-windows-msvc -p slipstream-client -p slipstream-server

      # - name: Build aarch64-pc-windows-msvc
      #   shell: powershell
      #   run: |
      #     cargo build -p slipstream-client -p slipstream-server --release --target aarch64-pc-windows-msvc

      - name: Package Windows artifacts
        shell: powershell
        run: |
          mkdir out\windows
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-client.exe -Destination out\windows -ErrorAction SilentlyContinue
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-server.exe -Destination out\windows -ErrorAction SilentlyContinue
          # Copy-Item -Path target\aarch64-pc-windows-msvc\release\slipstream-client.exe -Destination out\windows -ErrorAction SilentlyContinue
          # Copy-Item -Path target\aarch64-pc-windows-msvc\release\slipstream-server.exe -Destination out\windows -ErrorAction SilentlyContinue
          Compress-Archive -Path out\windows -DestinationPath slipstream-windows-artifacts.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: slipstream-windows-artifacts.zip

  build-android:
    name: Build Android (armeabi-v7a + arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential cmake python3 unzip

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Download Android NDK (r25b)
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip ndk.zip -d $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV
      
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      
      - name: Build Android targets
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo ndk -t armeabi-v7a -t arm64-v8a -o out/android --ndk $ANDROID_NDK_HOME build --release -p slipstream-client -p slipstream-server
          
      - name: Package Android artifacts
        run: |
          tar -czf slipstream-android-artifacts.tar.gz -C out android || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: slipstream-android-artifacts.tar.gz

  assemble-and-release:
    name: Assemble artifacts and create release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: artifacts/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-artifact
          path: artifacts/android

      - name: Create super-archive
        run: |
          mkdir -p out/super
          cp artifacts/linux/* out/super/ || true
          cp artifacts/windows/* out/super/ || true
          cp artifacts/android/* out/super/ || true
          tar -czf slipstream-all-platforms-${{ github.run_id }}.tar.gz -C out super

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          release_name: "Slipstream Release ${{ github.run_id }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload super-archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_name: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
