name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config build-essential libssl-dev python3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add target
        run: rustup target add x86_64-unknown-linux-gnu || true

      - name: Build release (x86_64)
        run: cargo build -p slipstream-client -p slipstream-server --release --target x86_64-unknown-linux-gnu

      - name: Package Linux artifacts
        run: |
          mkdir -p out/linux
          cp target/x86_64-unknown-linux-gnu/release/slipstream-client out/linux/ || true
          cp target/x86_64-unknown-linux-gnu/release/slipstream-server out/linux/ || true
          tar -czf slipstream-linux-artifacts.tar.gz -C out linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: slipstream-linux-artifacts.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Clone and bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install OpenSSL via vcpkg (x64 static)
        shell: powershell
        run: |
          .\vcpkg\vcpkg.exe install openssl:x64-windows-static
          $installed = Join-Path $PWD 'vcpkg\installed\x64-windows-static'
          "VCPKG_INSTALLATION_ROOT=$PWD\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_TRIPLET=x64-windows-static" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure Ninja is available (Windows)
        shell: powershell
        run: |
          # runner usually has ninja; try winget (if available), otherwise rely on existing ninja
          if (-not (Get-Command ninja.exe -ErrorAction SilentlyContinue)) {
            Write-Host "Ninja not found in PATH; attempting to install via choco"
            choco install -y ninja || Write-Host "choco install failed; hoping ninja is available"
          }

      - name: Build/preset picoquic for Windows (stages OpenSSL and exports envs, prefer Ninja)
        shell: powershell
        run: |
          # Use the windows helper; pass -UseNinja so it will use Ninja generator when Visual Studio not found.
          .\scripts\build_picoquic_windows.ps1 -Platform x64 -UseNinja

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add target
        run: rustup target add x86_64-pc-windows-msvc || true

      - name: Build x86_64-pc-windows-msvc
        shell: powershell
        env:
          # these should have been exported to GITHUB_ENV by the PowerShell helper script
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_SSL_LIBRARY: ${{ env.OPENSSL_SSL_LIBRARY }}
          OPENSSL_CRYPTO_LIBRARY: ${{ env.OPENSSL_CRYPTO_LIBRARY }}
          PICOQUIC_INCLUDE_DIR: ${{ env.PICOQUIC_INCLUDE_DIR }}
          PICOQUIC_LIB_DIR: ${{ env.PICOQUIC_LIB_DIR }}
          PICOTLS_INCLUDE_DIR: ${{ env.PICOTLS_INCLUDE_DIR }}
        run: |
          cargo build -p slipstream-client -p slipstream-server --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifacts
        shell: powershell
        run: |
          mkdir out\windows
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-client.exe -Destination out\windows -ErrorAction SilentlyContinue
          Copy-Item -Path target\x86_64-pc-windows-msvc\release\slipstream-server.exe -Destination out\windows -ErrorAction SilentlyContinue
          Compress-Archive -Path out\windows -DestinationPath slipstream-windows-artifacts.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: slipstream-windows-artifacts.zip

  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential cmake python3 unzip clang

      - name: Download Android NDK (r25b)
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip ndk.zip -d $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV

      - name: Prepare and build picoquic for Android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_ABI: arm64-v8a
          ANDROID_PLATFORM: android-21
          PICOQUIC_ANDROID: "1"
        run: |
          chmod +x ./scripts/build_picoquic.sh
          ANDROID_ABI=arm64-v8a ANDROID_PLATFORM=android-21 ANDROID_NDK_HOME="$ANDROID_NDK_HOME" ./scripts/build_picoquic.sh

          # Expose picoquic build outputs to the Cargo build via env
          echo "PICOQUIC_BUILD_DIR=$(pwd)/.picoquic-build" >> $GITHUB_ENV
          echo "PICOQUIC_LIB_DIR=$(pwd)/.picoquic-build" >> $GITHUB_ENV
          echo "PICOQUIC_INCLUDE_DIR=$(pwd)/vendor/picoquic/picoquic" >> $GITHUB_ENV

      - name: Setup Rust and add Android target
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add aarch64-linux-android || true
          cargo install cargo-ndk

      - name: Build Android arm64 (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          PICOQUIC_BUILD_DIR: ${{ env.PICOQUIC_BUILD_DIR }}
          PICOQUIC_LIB_DIR: ${{ env.PICOQUIC_LIB_DIR }}
          PICOQUIC_INCLUDE_DIR: ${{ env.PICOQUIC_INCLUDE_DIR }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          unset ANDROID_NDK_ROOT || true
          # Set pkg-config sysroot so openssl-sys can locate staged OpenSSL (if needed)
          export PKG_CONFIG_SYSROOT_DIR="$(pwd)/.picoquic-build"
          export PKG_CONFIG_PATH="$(pwd)/.picoquic-build/lib/pkgconfig:$(pwd)/.picoquic-build/_deps/picotls-src/lib/pkgconfig"
          cargo ndk -t arm64-v8a -o out/android build --release -p slipstream-client -p slipstream-server

      - name: Package Android artifacts
        run: |
          tar -czf slipstream-android-artifacts.tar.gz -C out android || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: slipstream-android-artifacts.tar.gz

  assemble-and-release:
    name: Assemble artifacts and create release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: artifacts/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-artifact
          path: artifacts/android

      - name: Create super-archive
        run: |
          mkdir -p out/super
          cp artifacts/linux/* out/super/ || true
          cp artifacts/windows/* out/super/ || true
          cp artifacts/android/* out/super/ || true
          tar -czf slipstream-all-platforms-${{ github.run_id }}.tar.gz -C out super

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          release_name: "Slipstream Release ${{ github.run_id }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload super-archive to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_name: slipstream-all-platforms-${{ github.run_id }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
